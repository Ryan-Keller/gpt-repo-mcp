name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Contract tests
        run: npm test -- tests/tool-contracts.test.ts tests/mcp-contract.test.ts

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Public hygiene
        run: npm run check:public

      - name: Build
        run: npm run build

      - name: Whitespace check
        run: git diff --check
